name: Release UXIcons

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "uxicons/**"

permissions:
  contents: write

jobs:
  pack-release-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine bump type
        id: uxicons-bump
        shell: bash
        run: |
          set -euo pipefail
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Latest commit message: $COMMIT_MSG"

          # 默认 patch
          BUMP_TYPE="uxicons-patch"
          if echo "$COMMIT_MSG" | grep -q "BREAKING CHANGE"; then
            BUMP_TYPE="uxicons-major"
          elif echo "$COMMIT_MSG" | grep -q "^uxicons: add"; then
            BUMP_TYPE="uxicons-minor"
          fi

          echo "BUMP_TYPE=$BUMP_TYPE" >> $GITHUB_OUTPUT

      - name: Bump uxicons version
        shell: bash
        run: |
          bash scripts/bump-version.sh ${{ steps.uxicons-bump.outputs.BUMP_TYPE }}

      - name: Validate icons dir
        shell: bash
        run: |
          set -euo pipefail
          test -d "uxicons"
          test "$(find uxicons -mindepth 1 | head -n 1 | wc -l)" -gt 0

      - name: Create zip
        shell: bash
        run: |
          set -euo pipefail
          UX_VERSION=$(cat uxicons/VERSION)
          REVISION=1
          ZIP_NAME="uxicons-${UX_VERSION}-r${REVISION}.zip"
          rm -f "$ZIP_NAME"
          (cd uxicons && zip -r "../$ZIP_NAME" . \
           -x "VERSION" -x "uxicons.lock" \
           -x "*.DS_Store" -x "__MACOSX/*")
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: Compute sha256 and size
        id: hash
        shell: bash
        run: |
          set -euo pipefail
          SHA256="$(sha256sum "${{ steps.create-zip.outputs.zip_name }}" | awk '{print $1}')"
          SIZE="$(stat -c%s "${{ steps.create-zip.outputs.zip_name }}")"
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      - name: Build index.json
        id: index
        shell: bash
        run: |
          set -euo pipefail
          UX_VERSION=$(cat uxicons/VERSION)
          REVISION=1
          PUBLISHED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          ZIP="${{ steps.create-zip.outputs.zip_name }}"
          TAG="icons/stable/v${UX_VERSION}-r${REVISION}"
          DL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ZIP}"

          jq -n \
            --arg channel "stable" \
            --arg icons_version "$UX_VERSION" \
            --argjson revision $REVISION \
            --arg zip_name "$ZIP" \
            --arg zip_sha256 "${{ steps.hash.outputs.sha256 }}" \
            --argjson zip_size "${{ steps.hash.outputs.size }}" \
            --arg download_url "$DL" \
            --arg published_at "$PUBLISHED_AT" \
            '{
              channel: $channel,
              icons_version: $icons_version,
              revision: $revision,
              zip_name: $zip_name,
              zip_sha256: $zip_sha256,
              zip_size: $zip_size,
              download_url: $download_url,
              published_at: $published_at
            }' > index.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "icons/stable/v${{ steps.index.outputs.icons_version }}-r1"
          name: "UXIcons stable ${{ steps.index.outputs.icons_version }} r1"
          files: |
            ${{ steps.index.outputs.zip_name }}
            index.json

      - name: Publish index.json to GitHub Pages
        shell: bash
        run: |
          set -euo pipefail
          UX_VERSION=$(cat uxicons/VERSION)
          REVISION=1
          CHANNEL="stable"

          rm -rf gh-pages
          git clone --depth 1 --branch gh-pages "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages 2>/dev/null || {
            git clone --depth 1 "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
            (cd gh-pages && git checkout --orphan gh-pages && git rm -rf . || true)
          }

          mkdir -p "gh-pages/${CHANNEL}"
          cp -f index.json "gh-pages/${CHANNEL}/index.json"
          mkdir -p "gh-pages/${CHANNEL}/history"
          cp -f index.json "gh-pages/${CHANNEL}/history/${UX_VERSION}-r${REVISION}.json"

          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${CHANNEL}/index.json" "${CHANNEL}/history/${UX_VERSION}-r${REVISION}.json"
          git commit -m "Update ${CHANNEL} index: ${UX_VERSION}-r${REVISION}" || exit 0
          git push origin gh-pages
