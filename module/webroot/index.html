<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ColorOS Icons Patch</title>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="title">ColorOS Icons Patch</div>
      <div class="subtitle">KernelSU WebUI</div>
    </header>

    <main class="container">
      <!-- Home -->
      <section id="page-home" class="page active">
        <div class="card">
          <div class="card-title">状态</div>
          <div class="row">
            <div class="kv">
              <div class="k">模块</div>
              <div class="v" id="st-module">-</div>
            </div>
            <div class="kv">
              <div class="k">通道</div>
              <div class="v" id="st-channel">-</div>
            </div>
          </div>
          <div class="row">
            <div class="kv">
              <div class="k">图标版本</div>
              <div class="v" id="st-icons-version">-</div>
            </div>
            <div class="kv">
              <div class="k">修订</div>
              <div class="v" id="st-icons-rev">-</div>
            </div>
          </div>
          <div class="row">
            <div class="kv">
              <div class="k">上次更新</div>
              <div class="v" id="st-updated-at">-</div>
            </div>
            <div class="kv">
              <div class="k">上次运行</div>
              <div class="v" id="st-last-run">-</div>
            </div>
          </div>
          <div class="hint" id="st-last-error"></div>
        </div>

        <div class="card">
          <div class="card-title">操作</div>
          <div class="btn-row">
            <button class="btn" id="btn-selftest">自检 aapt2</button>
            <button class="btn" id="btn-scan">扫描应用</button>
            <button class="btn primary" id="btn-update">在线更新</button>
          </div>
          <div class="hint" id="op-hint">输出在下方结果区</div>
        </div>

        <div class="card">
          <div class="card-title">结果</div>
          <pre class="pre" id="result-json">{}</pre>
        </div>
      </section>

      <!-- Settings -->
      <section id="page-settings" class="page">
        <div class="card">
          <div class="card-title">设置</div>

          <label class="field">
            <div class="label">模块目录（MODDIR）</div>
            <input id="in-moddir" class="input" spellcheck="false" />
            <div class="desc">通常是 /data/adb/modules/ColorOSIconsPatch</div>
          </label>

          <label class="field">
            <div class="label">通道</div>
            <select id="in-channel" class="input">
              <option value="stable">stable</option>
              <option value="beta">beta</option>
            </select>
          </label>

          <label class="field">
            <div class="label">index.json URL</div>
            <input id="in-index" class="input" spellcheck="false" />
            <div class="desc">update 将从这里读取你的 index.json</div>
          </label>

          <label class="field">
            <div class="label">aapt2 路径</div>
            <input id="in-aapt2" class="input" spellcheck="false" />
          </label>

          <label class="field row-inline">
            <input id="in-useronly" type="checkbox" />
            <div class="label-inline">仅扫描第三方应用（/data/app）</div>
          </label>

          <label class="field">
            <div class="label">扫描数量限制（可空）</div>
            <input
              id="in-limit"
              class="input"
              inputmode="numeric"
              placeholder="例如 200；留空表示不限制"
            />
          </label>

          <div class="btn-row">
            <button class="btn" id="btn-save">保存设置</button>
            <button class="btn" id="btn-load">从文件读取</button>
          </div>

          <div class="hint" id="settings-hint"></div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item active" data-target="home">首页</button>
      <button class="nav-item" data-target="settings">设置</button>
    </nav>

    <div id="toast" class="toast"></div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
